[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
# Required by @actual-app/api → better-sqlite3 native C++ addon.
# Equivalent to the former Dockerfile's apk add python3 make g++.
nixPkgs = ["python3", "gnumake", "gcc"]

# Nixpacks' generated Dockerfile places ARG NIXPACKS_NODE_VERSION AFTER
# the nix-env step, so the nix-npm-overlay can't read it. Install Node.js
# via NodeSource apt repo instead, which runs in the setup phase before npm ci.
cmds = ["curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash - && sudo apt-get install -y nodejs"]
